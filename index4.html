<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo">
                SPS MUN 3.0
            </div>

            <ul class="nav-links">

                <li>
                    <a href="index.html">
                        About
                    </a>
                </li>

                <li>
                    <a href="index2.html">
                        Committees
                    </a>
                </li>

                <li>
                    <a href="index3.html" class="active">
                        Register
                    </a>
                </li>

            </ul>

        </nav>

    </header>

    <main class="page-container">

        <h1 class="section-title">
            Delegate Registration
        </h1>

        <form class="registration-form">

            <input type="text" placeholder="Full Name" required>

            <input type="email" placeholder="Email Address" required>

            <input type="text" placeholder="School Name" required>

            <select required>

                <option value="">
                    Select Committee
                </option>

                <option>
                    UNHRC
                </option>

                <option>
                    UNSC
                </option>

                <option>
                    WHO
                </option>

            </select>

            <button type="submit" class="btn-primary">
                Submit Registration
            </button>

        </form>

    </main>

    <footer>

        <p>
            © 2026 SPS MUN 3.0
        </p>

    </footer>

    <script src="scripts.js"></script>

</body>

</html>
